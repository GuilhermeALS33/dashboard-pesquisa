<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Pesquisa de Satisfação</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500&family=DM+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1A1A18;
    --text-muted: #6B6A65;
    --text-hint: #9E9D97;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --blue: #0C447C;
    --blue-bg: #E6F1FB;
    --red-bg: #FCEBEB;
    --red: #A32D2D;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  .page { max-width: 1100px; margin: 0 auto; }

  .header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    flex-wrap: wrap; gap: 12px;
  }
  .header-left h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
  .header-left p  { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid transparent;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill-idle { background: #F1EFE8; color: var(--text-muted); border-color: var(--border); }
  .pill-ok   { background: var(--green-bg); color: var(--green); }
  .pill-err  { background: var(--red-bg);   color: var(--red);   }
  .pill-wait { background: var(--amber-bg); color: var(--amber); }

  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .config-box label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 8px; }
  .config-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .config-row input[type=text],
  .config-row input[type=number] {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 8px 12px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius);
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .config-row input[type=text]   { flex: 1; min-width: 260px; }
  .config-row input[type=number] { width: 160px; }
  .config-row input:focus { border-color: #378ADD; }
  .countdown { font-size: 12px; color: var(--text-hint); margin-top: 8px; font-family: 'DM Mono', monospace; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 16px; border-radius: var(--radius);
    border: 1px solid var(--border-md);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .btn-primary:hover { background: #0C447C; border-color: #0C447C; }
  .btn-sm { font-size: 12px; padding: 6px 12px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .metric-value { font-size: 26px; font-weight: 500; letter-spacing: -0.5px; }
  .metric-value.green { color: var(--green); }
  .metric-value.amber { color: var(--amber); }
  .metric-value.blue  { color: var(--blue);  }

  .main-grid {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
  }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; }

  .chart-wrap { position: relative; width: 100%; height: 190px; }
  .legend { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .search-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 7px 12px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius);
    background: var(--bg); color: var(--text);
    width: 200px; outline: none;
  }
  .search-input:focus { border-color: #378ADD; }

  .table-scroll { max-height: 300px; overflow-y: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    font-weight: 500; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-hint);
    text-align: left; padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface);
  }
  td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg); }
  .remove-btn {
    cursor: pointer; font-size: 12px; color: var(--text-hint);
    background: none; border: none; padding: 2px 4px; border-radius: 4px;
  }
  .remove-btn:hover { color: var(--red); background: var(--red-bg); }

  .add-form {
    margin: 10px 0; padding: 12px;
    background: var(--bg); border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .add-row input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    outline: none; width: 100%;
  }
  .add-row input:focus { border-color: #378ADD; }

  .empty { color: var(--text-hint); text-align: center; padding: 2.5rem 0; font-size: 13px; line-height: 1.8; }

  @media (max-width: 700px) {
    body { padding: 1rem; }
    .main-grid { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>Dashboard — Pesquisa de Satisfação</h1>
      <p id="last-update">Aguardando configuração</p>
    </div>
    <div class="header-actions">
      <span class="pill pill-idle" id="status-pill">
        <span class="dot"></span>
        <span id="status-text">Não configurado</span>
      </span>
      <button class="btn btn-sm" onclick="exportCSV()">Exportar CSV</button>
    </div>
  </div>

  <div class="config-box">
    <label>Fonte de dados (URL do Google Apps Script)</label>
    <div class="config-row">
      <input type="text" id="urlInput" placeholder="https://script.google.com/macros/s/.../exec" />
      <input type="number" id="totalInput" placeholder="Total de clientes enviados" min="1" />
      <button class="btn btn-primary" onclick="iniciar()">Conectar e atualizar</button>
    </div>
    <div class="countdown" id="countdown"></div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Total enviados</div>
      <div class="metric-value" id="m-total">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Responderam</div>
      <div class="metric-value green" id="m-resp">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pendentes</div>
      <div class="metric-value amber" id="m-pend">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Taxa de resposta</div>
      <div class="metric-value blue" id="m-taxa">—</div>
    </div>
  </div>

  <div class="main-grid">

    <div class="card">
      <div class="card-title">Visão geral</div>
      <div class="chart-wrap">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot" style="background:#1D9E75"></span>
          <span id="leg-resp">Responderam: —</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:#D3D1C7"></span>
          <span id="leg-pend">Pendentes: —</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-header">
        <div class="card-title" style="margin-bottom:0">Clientes que responderam</div>
        <input class="search-input" type="text" placeholder="Buscar..." oninput="filtrar(this.value)" />
      </div>

      <button class="btn btn-sm" onclick="toggleForm()">+ Adicionar manualmente</button>

      <div class="add-form" id="addForm" style="display:none">
        <div class="add-row">
          <input type="text" id="f-nome" placeholder="Nome" />
          <input type="text" id="f-razao" placeholder="Razão Social" />
        </div>
        <div class="add-row">
          <input type="email" id="f-email" placeholder="E-mail" />
          <input type="text" id="f-cnpj" placeholder="CNPJ" />
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-primary btn-sm" onclick="addManual()">Confirmar</button>
          <button class="btn btn-sm" onclick="toggleForm()">Cancelar</button>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:22%">Nome</th>
              <th style="width:28%">Razão Social</th>
              <th style="width:28%">E-mail</th>
              <th style="width:16%">CNPJ</th>
              <th style="width:6%"></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" class="empty">Configure o link acima para carregar os dados.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  let clientes = [];
  let manuais  = [];
  let totalEnviados = 0;
  let pieChart = null;
  let filtro   = '';
  let intervalo = null;
  let countdownInterval = null;
  const INTERVALO = 3 * 60 * 60 * 1000;

  function nowStr() {
    return new Date().toLocaleString('pt-BR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }

  function setStatus(tipo, txt) {
    document.getElementById('status-pill').className = 'pill pill-' + tipo;
    document.getElementById('status-text').textContent = txt;
  }

  function iniciar() {
    const url = document.getElementById('urlInput').value.trim();
    const tot = parseInt(document.getElementById('totalInput').value) || 0;
    if (!url) { setStatus('err', 'URL inválida'); return; }
    totalEnviados = tot;
    if (intervalo) clearInterval(intervalo);
    buscarDados(url);
    intervalo = setInterval(() => buscarDados(url), INTERVALO);
  }

  async function buscarDados(url) {
    setStatus('wait', 'Buscando dados...');
    document.getElementById('last-update').textContent = 'Atualizando...';
    try {
      const resp = await fetch(url, { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const txt = await resp.text();
      processarResposta(txt.trim());
      setStatus('ok', 'Atualizado');
      document.getElementById('last-update').textContent = 'Última atualização: ' + nowStr();
      iniciarContagem();
    } catch(e) {
      setStatus('err', 'Erro ao carregar');
      document.getElementById('last-update').textContent = 'Falha: ' + nowStr();
      document.getElementById('countdown').textContent = 'Verifique o link e tente novamente.';
    }
  }

  function processarResposta(txt) {
    // JSON array
    if (txt.startsWith('[')) {
      try { importarObjetos(JSON.parse(txt)); return; } catch(e) {}
    }
    // JSON objects um por linha (formato do Power Automate / Apps Script)
    if (txt.startsWith('{')) {
      try {
        const arr = txt.split('\n').filter(l => l.trim()).map(l => JSON.parse(l));
        importarObjetos(arr);
        return;
      } catch(e) {}
    }
    // CSV fallback
    processarCSV(txt);
  }

  function importarObjetos(arr) {
    const importados = arr.map(r => ({
      nome:   String(r['Insira seu nome']  || r['Nome']  || '').trim(),
      razao:  String(r['Insira sua Razão Social'] || r['Razão Social'] || '').trim(),
      email:  String(r['Insira seu email'] || r['Email'] || '').trim(),
      cnpj:   String(r['Por favor, nos informe o seu CNPJ_x002e_'] || r['CNPJ'] || '').trim(),
      manual: false
    })).filter(c => c.nome || c.razao);

    clientes = [...importados, ...manuais];
    atualizarTudo();
  }

  function processarCSV(txt) {
    const lines = txt.split('\n').filter(l => l.trim());
    if (lines.length < 2) return;
    const headers = lines[0].split(/[,;|\t]/).map(h => h.trim().replace(/"/g, ''));
    const find = (opts) => headers.find(h => opts.some(o => h.toLowerCase().includes(o))) || '';

    const kNome  = find(['seu nome','nome','cliente']);
    const kRazao = find(['razão social','razao social','insira sua']);
    const kEmail = find(['email','e-mail']);
    const kCnpj  = find(['cnpj']);

    const importados = lines.slice(1).map(l => {
      const vals = l.split(/[,;|\t]/).map(v => v.trim().replace(/"/g,''));
      const obj  = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');
      return { nome: (obj[kNome]||'').trim(), razao: (obj[kRazao]||'').trim(),
               email: (obj[kEmail]||'').trim(), cnpj: (obj[kCnpj]||'').trim(), manual: false };
    }).filter(c => c.nome || c.razao);

    clientes = [...importados, ...manuais];
    atualizarTudo();
  }

  function atualizarTudo() {
    const resp  = clientes.length;
    const total = totalEnviados;
    const pend  = total > 0 ? Math.max(0, total - resp) : null;
    const taxa  = total > 0 ? Math.round((resp / total) * 100) : null;

    document.getElementById('m-total').textContent = total > 0 ? total : '—';
    document.getElementById('m-resp').textContent  = resp;
    document.getElementById('m-pend').textContent  = pend !== null ? pend : '—';
    document.getElementById('m-taxa').textContent  = taxa !== null ? taxa + '%' : '—';
    document.getElementById('leg-resp').textContent = 'Responderam: ' + resp;
    document.getElementById('leg-pend').textContent = 'Pendentes: ' + (pend !== null ? pend : '—');

    atualizarPizza(resp, pend !== null ? pend : 0, taxa);
    renderTabela();
  }

  function atualizarPizza(resp, pend, taxa) {
    const ctx = document.getElementById('pieChart').getContext('2d');
    if (pieChart) pieChart.destroy();
    const temDados = resp > 0 || pend > 0;
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Responderam', 'Pendentes'],
        datasets: [{
          data: temDados ? [resp, pend] : [0, 1],
          backgroundColor: temDados ? ['#1D9E75','#D3D1C7'] : ['#EEEEEE'],
          borderWidth: 0, hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: { legend: { display: false }, tooltip: { enabled: temDados } }
      },
      plugins: [{
        id: 'centro',
        beforeDraw(chart) {
          const { width, height, ctx } = chart;
          ctx.save();
          ctx.font = "500 26px 'DM Sans', sans-serif";
          ctx.fillStyle = '#0F6E56';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(taxa !== null ? taxa + '%' : '—', width / 2, height / 2);
          ctx.restore();
        }
      }]
    });
  }

  function renderTabela() {
    const body = document.getElementById('tableBody');
    const lista = clientes.filter(c =>
      !filtro || [c.nome, c.razao, c.email, c.cnpj].some(v =>
        String(v).toLowerCase().includes(filtro.toLowerCase())
      )
    );
    if (!lista.length) {
      body.innerHTML = '<tr><td colspan="5" class="empty">Nenhum resultado encontrado.</td></tr>';
      return;
    }
    body.innerHTML = lista.map(c => `
      <tr>
        <td title="${c.nome}">${c.nome || '—'}</td>
        <td title="${c.razao}">${c.razao || '—'}</td>
        <td title="${c.email}" style="color:var(--text-muted)">${c.email || '—'}</td>
        <td title="${c.cnpj}"  style="color:var(--text-muted)">${c.cnpj  || '—'}</td>
        <td>${c.manual
          ? `<button class="remove-btn" data-nome="${c.nome}" data-razao="${c.razao}" onclick="remover(this)">✕</button>`
          : ''}</td>
      </tr>`).join('');
  }

  function filtrar(v) { filtro = v; renderTabela(); }

  function remover(btn) {
    const nome = btn.dataset.nome, razao = btn.dataset.razao;
    manuais  = manuais.filter( c => !(c.nome === nome && c.razao === razao));
    clientes = clientes.filter(c => !(c.nome === nome && c.razao === razao));
    atualizarTudo();
  }

  function toggleForm() {
    const f = document.getElementById('addForm');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  }

  function addManual() {
    const nome = document.getElementById('f-nome').value.trim();
    const razao = document.getElementById('f-razao').value.trim();
    if (!nome && !razao) return;
    const c = { nome, razao,
      email: document.getElementById('f-email').value.trim(),
      cnpj:  document.getElementById('f-cnpj').value.trim(),
      manual: true };
    manuais.push(c); clientes.push(c);
    ['f-nome','f-razao','f-email','f-cnpj'].forEach(id => document.getElementById(id).value = '');
    toggleForm();
    atualizarTudo();
  }

  function exportCSV() {
    if (!clientes.length) return;
    const rows = clientes.map(c => `"${c.nome}","${c.razao}","${c.email}","${c.cnpj}"`).join('\n');
    const blob = new Blob(['\uFEFF' + 'Nome,Razão Social,E-mail,CNPJ\n' + rows], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'respondentes_pesquisa.csv';
    a.click();
  }

  function iniciarContagem() {
    if (countdownInterval) clearInterval(countdownInterval);
    const proxima = Date.now() + INTERVALO;
    countdownInterval = setInterval(() => {
      const diff = proxima - Date.now();
      if (diff <= 0) { clearInterval(countdownInterval); return; }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').textContent =
        'Próxima atualização em ' + h + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
    }, 1000);
  }

  atualizarTudo();
</script>
</body>
</html>
